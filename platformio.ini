[platformio]
workspace_dir = .pio.nosync
default_envs = ESP32GrooveboxR2

[env:ESP32GrooveboxR2]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800 ; 230400 ; 460800 ; 921600 ; 230400
upload_resetmethod = default ; nodemcu ; default ; hard
board_build.filesystem = littlefs
board_build.partitions = partitions_4MB_max_app.csv

lib_deps =
  adafruit/Adafruit GFX Library @ ^1.12.1
  adafruit/Adafruit ST7735 and ST7789 Library @ ^1.11.0
  bblanchon/ArduinoJson @ ^7.3.1
  tzapu/WiFiManager @ ^2.0.17

build_flags =
;--  0=None, 1=Error, 2=Warning, 3=Info, 4=Debug, 5=Verbose
  -D CORE_DEBUG_LEVEL=3
;--  EPS_LOG_NONE=0, ESP_LOG_ERROR=1, ESP_LOG_WARN=2, ESP_LOG_INFO=3, ESP_LOG_DEBUG=4, 
;--  ESP_LOG_VERBOSE=5  
  -D LOG_LOCAL_LEVEL=ESP_LOG_INFO
;--  Enable color palette test mode (shows only color pattern screen)
;  -D TEST_COLOR_PATERN
;--  Enable fixed 1kHz audio test tone on I2S output (disables sample playback)
  -D TEST_TONE
;-- Default Theme Color options 1=Red, 2=Green, 3=Blue, 4=Indigo, 5=Violet, 6=Yellow
  -D DEFAULT_THEME_COLOR=1
;-- no hardware connected
  -D NO_DAC_HARDWARE

;-- GPIO6, GPIO7, GPIO8, GPIO9, GPIO10, GPIO11 are used for flash memory on ESP32 
;-- GPIO16, GPIO17 are used for PSRAM on ESP32-WROVER and should be avoided
;-- Bootstrap GPIO0, GPIO2, GPIO4, GPIO5, GPIO12, GPIO15 should be used with caution  
;
  -D PIN_TFT_BL=13
  -D PIN_TFT_RST=14
  -D PIN_TFT_CS=18
  -D PIN_TFT_SCL=21
  -D PIN_TFT_SDA=22
  -D PIN_TFT_DC=23
  -D PIN_ENC_BTN=25
  -D PIN_KEY0=26
  -D PIN_ENC_A=32
  -D PIN_ENC_B=33

  -D PIN_I2S_BCLK=27
  -D PIN_I2S_WS=25
  -D PIN_I2S_DOUT=26

  -D TFT_WIDTH=320
  -D TFT_HEIGHT=240

  -D ENCODER_SHORT_PRESS_MS=50
  -D ENCODER_MEDIUM_PRESS_MS=1000
  -D ENCODER_LONG_PRESS_MS=2000
  -D BUTTON_SHORT_PRESS_MS=50
  -D BUTTON_MEDIUM_PRESS_MS=1000
  -D BUTTON_LONG_PRESS_MS=2000

  -D DEFAULT_AP_SSID=\"Groovebox\"
  -D DEFAULT_AP_PASSWORD=\"\"
  -D DEFAULT_WIFI_HOSTNAME=\"Groovebox\"

  -D DEFAULT_ON_TIME=5
  -D DEFAULT_OFF_TIME=5
  -D DEFAULT_ON_UNIT=1
  -D DEFAULT_OFF_UNIT=1

build_src_flags =
  -Wall
  -Wextra

[env:ESP32GrooveboxR3]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800 ; 230400 ; 460800 ; 921600 ; 230400
upload_resetmethod = default ; nodemcu ; default ; hard
board_build.filesystem = littlefs
board_build.partitions = partitions_4MB_littlefs.csv ;-- 1.2KB

board_build.psram = enabled

lib_deps =
  adafruit/Adafruit GFX Library @ ^1.12.1
  adafruit/Adafruit ST7735 and ST7789 Library @ ^1.11.0
  bblanchon/ArduinoJson @ ^7.3.1
  tzapu/WiFiManager @ ^2.0.17

build_flags =
;--  0=None, 1=Error, 2=Warning, 3=Info, 4=Debug, 5=Verbose
  -D CORE_DEBUG_LEVEL=3
  -D BOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
;--  EPS_LOG_NONE=0, ESP_LOG_ERROR=1, ESP_LOG_WARN=2, ESP_LOG_INFO=3, ESP_LOG_DEBUG=4, 
;--  ESP_LOG_VERBOSE=5  
  -D LOG_LOCAL_LEVEL=ESP_LOG_INFO
;--  Enable color palette test mode (shows only color pattern screen)
;  -D TEST_COLOR_PATERN
;--  Run isolated SD card smoke test at boot and halt after diagnostics
;  -D SD_SMOKE_TEST
;--  Enable audio test tone on I2S output (disables sample playback)
;  -D TEST_TONE
  -D TEST_TONE_FREQUENCY_HZ=2000
;-- Default Theme Color options 1=Red, 2=Green, 3=Blue, 4=Indigo, 5=Violet, 6=Yellow
  -D DEFAULT_THEME_COLOR=1
;-- no hardware connected
; -D NO_DAC_HARDWARE
;-- Show debug info in Display
; -D DISPLAY_DEBUG_INFO
; -D SD_VERBOSE_DIRECTORY_LISTING

;-- GPIO6, GPIO7, GPIO8, GPIO9, GPIO10, GPIO11 are used for flash memory on ESP32 
;-- GPIO16, GPIO17 are used for PSRAM on ESP32-WROVER and should be avoided
;-- Bootstrap GPIO0, GPIO2, GPIO4, GPIO5, GPIO12, GPIO15 should be used with caution  
;-- FREE gpio pins for R3 revision: 14, 32, 33
;
  -D PIN_TFT_BL=2     ;- was 13
  -D PIN_TFT_RST=4    ;- was 14
  -D PIN_TFT_CS=5     ;- was 18
  -D PIN_TFT_SCL=18   ;- was 21 [SCLK]
  -D PIN_TFT_SDA=23   ;- was 22 [MOSI]
  -D PIN_TFT_DC=15    ;- was 23
  -D PIN_ENC_BTN=35   ;- was 25
  -D PIN_KEY0=0       ;- of 34      ;- was 26
  -D PIN_ENC_A=36     ;- was 32 [VP]
  -D PIN_ENC_B=39     ;- was 33 [VN]

  -D PIN_I2S_BCLK=26
  -D PIN_I2S_WS=25
  -D PIN_I2S_DOUT=27
  -D PIN_I2S_SD=14

  -D PIN_SD_CS=13
  -D PIN_SD_SCK=18  ;- share with TFT_SCL
  -D PIN_SD_MISO=19
  -D PIN_SD_MOSI=23 ;- share with TFT_SDA

  -D TFT_WIDTH=320
  -D TFT_HEIGHT=240

  -D ENCODER_SHORT_PRESS_MS=50
  -D ENCODER_MEDIUM_PRESS_MS=1000
  -D ENCODER_LONG_PRESS_MS=2000
  -D BUTTON_SHORT_PRESS_MS=50
  -D BUTTON_MEDIUM_PRESS_MS=1000
  -D BUTTON_LONG_PRESS_MS=2000

  -D DEFAULT_AP_SSID=\"Groovebox\"
  -D DEFAULT_AP_PASSWORD=\"\"
  -D DEFAULT_WIFI_HOSTNAME=\"Groovebox\"

  -D DEFAULT_ON_TIME=5
  -D DEFAULT_OFF_TIME=5
  -D DEFAULT_ON_UNIT=1
  -D DEFAULT_OFF_UNIT=1

build_src_flags =
  -Wall
  -Wextra

[env:ESP32S3GrooveboxR3]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800 ; 230400 ; 460800 ; 921600 ; 230400
upload_resetmethod = default ; nodemcu ; default ; hard
board_build.filesystem = littlefs
; board_build.partitions = partitions_4MB_littlefs.csv
; board_build.partitions = partitions_2MB_littlefs.csv ;-- 2.4KB
board_build.partitions = partitions_4MB_littlefs.csv ;-- 1.2KB

board_build.psram = enabled

lib_deps =
  adafruit/Adafruit GFX Library @ ^1.12.1
  adafruit/Adafruit ST7735 and ST7789 Library @ ^1.11.0
  bblanchon/ArduinoJson @ ^7.3.1
  tzapu/WiFiManager @ ^2.0.17

build_flags =
;--  0=None, 1=Error, 2=Warning, 3=Info, 4=Debug, 5=Verbose
  -D CORE_DEBUG_LEVEL=3
  -D BOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
;--  EPS_LOG_NONE=0, ESP_LOG_ERROR=1, ESP_LOG_WARN=2, ESP_LOG_INFO=3, ESP_LOG_DEBUG=4, 
;--  ESP_LOG_VERBOSE=5  
  -D LOG_LOCAL_LEVEL=ESP_LOG_INFO
;--  Enable color palette test mode (shows only color pattern screen)
;  -D TEST_COLOR_PATERN
;--  Run isolated SD card smoke test at boot and halt after diagnostics
;  -D SD_SMOKE_TEST
;--  Enable audio test tone on I2S output (disables sample playback)
;  -D TEST_TONE
  -D TEST_TONE_FREQUENCY_HZ=2000
;-- Default Theme Color options 1=Red, 2=Green, 3=Blue, 4=Indigo, 5=Violet, 6=Yellow
  -D DEFAULT_THEME_COLOR=1
;-- no hardware connected
; -D NO_DAC_HARDWARE
;-- Show debug info in Display
; -D DISPLAY_DEBUG_INFO
; -D SD_VERBOSE_DIRECTORY_LISTING

;-- GPIO3   STRAP/JTAG source pin, vermijden
;-- GPIO19  USB D-
;-- GPIO20  USB D+
;-- GPIO21  kan wel, maar zou ik vrij houden als extra optie
;-- GPIO26-37 vermijden bij S3 met PSRAM/flash
;-- GPIO45  STRAP: bepaalt o.a. VDD_SPI, vermijden
;-- GPIO46  STRAP + input-only/boot-related, vermijden

  -D PIN_TFT_BL=2        ; normal GPIO, OK
  -D PIN_TFT_RST=4       ; normal GPIO, OK
  -D PIN_TFT_CS=5        ; normal GPIO, OK
  -D PIN_TFT_SCL=12      ; normal GPIO, SPI SCK, OK
  -D PIN_TFT_SDA=11      ; normal GPIO, SPI MOSI, OK
  -D PIN_TFT_DC=15       ; normal GPIO, OK

  -D PIN_ENC_BTN=6       ; normal GPIO, OK
  -D PIN_KEY0=0          ; STRAP/BOOT pin: knop naar GND mag, maar alleen als BOOT/FLASH button
  -D PIN_ENC_A=16        ; normal GPIO, OK
  -D PIN_ENC_B=17        ; normal GPIO, OK

  -D PIN_SD_CS=13        ; normal GPIO, OK
  -D PIN_SD_SCK=12       ; shared SPI SCK with TFT
  -D PIN_SD_MISO=18      ; normal GPIO, SPI MISO, OK
  -D PIN_SD_MOSI=11      ; shared SPI MOSI with TFT

  -D PIN_USB_DM=19       ; USB D-, niet als spare gebruiken
  -D PIN_USB_DP=20       ; USB D+, niet als spare gebruiken

  -D PIN_SPARE1=7        ; normal GPIO, OK
  -D PIN_SPARE2=8        ; normal GPIO, OK
  -D PIN_SPARE3=9        ; normal GPIO, OK
  -D PIN_SPARE4=10       ; normal GPIO, OK
  -D PIN_SPARE5=14       ; normal GPIO, OK
  -D PIN_SPARE6=38       ; normal GPIO, OK
  -D PIN_SPARE7=39       ; JTAG MTCK by default; bruikbaar als GPIO als je externe JTAG niet gebruikt
  -D PIN_SPARE8=40       ; JTAG MTDO by default; bruikbaar als GPIO als je externe JTAG niet gebruikt
  -D PIN_SPARE9=41       ; JTAG MTDI by default; bruikbaar als GPIO als je externe JTAG niet gebruikt
  -D PIN_SPARE10=42      ; JTAG MTMS by default; bruikbaar als GPIO als je externe JTAG niet gebruikt
  -D PIN_SPARE11=43      ; UART0 TX by default; bruikbaar, maar handig als nood-debug TX
  -D PIN_SPARE12=44      ; UART0 RX by default; bruikbaar, maar handig als nood-debug RX
  -D PIN_SPARE13=47      ; normal GPIO, OK
  -D PIN_SPARE14=48      ; normal GPIO, OK

  -D TFT_WIDTH=320
  -D TFT_HEIGHT=240

  -D ENCODER_SHORT_PRESS_MS=50
  -D ENCODER_MEDIUM_PRESS_MS=1000
  -D ENCODER_LONG_PRESS_MS=2000
  -D BUTTON_SHORT_PRESS_MS=50
  -D BUTTON_MEDIUM_PRESS_MS=1000
  -D BUTTON_LONG_PRESS_MS=2000

  -D DEFAULT_AP_SSID=\"Groovebox\"
  -D DEFAULT_AP_PASSWORD=\"\"
  -D DEFAULT_WIFI_HOSTNAME=\"Groovebox\"

  -D DEFAULT_ON_TIME=5
  -D DEFAULT_OFF_TIME=5
  -D DEFAULT_ON_UNIT=1
  -D DEFAULT_OFF_UNIT=1

build_src_flags =
  -Wall
  -Wextra
