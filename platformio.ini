[platformio]
workspace_dir = .pio.nosync
default_envs = ESP32S3GrooveboxR3

;======================================= ESP32-S3 ==[ R3 ]=======================================
[env:ESP32S3GrooveboxR3]
platform = espressif32
; board = esp32dev
board = esp32-s3-devkitc-1
framework = arduino
;---- ESP32-S3 N32R8T8C variant with 32MB flash and 8MB PSRAM (Opulent)
; board_build.arduino.memory_type = opi_opi
; board_build.flash_mode = opi
; board_build.psram_type = opi
; board_upload.flash_size = 32MB
; board_upload.maximum_size = 33554432
; board_build.partitions = partitions_S3_32MB.csv

;---- ESP32-S3 N4R4 variant with 4MB flash and 4MB PSRAM
board_build.arduino.memory_type = qio_qspi
board_build.flash_mode = qio
board_build.psram_type = qspi
board_upload.flash_size = 8MB
board_upload.maximum_size = 4194304
board_build.partitions = partitions_S3_N4R4.csv

monitor_speed = 115200
upload_speed = 460800 ; 230400 ; 460800 ; 921600 ; 230400
upload_resetmethod = default ; nodemcu ; default ; hard
board_build.filesystem = littlefs

board_build.psram = enabled

lib_deps =
  adafruit/Adafruit GFX Library @ ^1.12.1
  adafruit/Adafruit ST7735 and ST7789 Library @ ^1.11.0
  bblanchon/ArduinoJson @ ^7.3.1
  tzapu/WiFiManager @ ^2.0.17

build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D BOARD_HAS_PSRAM
;  -mfix-esp32-psram-cache-issue

;--  0=None, 1=Error, 2=Warning, 3=Info, 4=Debug, 5=Verbose
  -D CORE_DEBUG_LEVEL=3
;--  EPS_LOG_NONE=0, ESP_LOG_ERROR=1, ESP_LOG_WARN=2, ESP_LOG_INFO=3, ESP_LOG_DEBUG=4, 
;--  ESP_LOG_VERBOSE=5  
  -D LOG_LOCAL_LEVEL=ESP_LOG_INFO
;--  Enable color palette test mode (shows only color pattern screen)
;  -D TEST_COLOR_PATERN
;--  Run isolated SD card smoke test at boot and halt after diagnostics
;  -D SD_SMOKE_TEST
;--  Enable audio test tone on I2S output (disables sample playback)
;  -D TEST_TONE
  -D TEST_TONE_FREQUENCY_HZ=2000
;-- Default Theme Color options 1=Red, 2=Green, 3=Blue, 4=Indigo, 5=Violet, 6=Yellow
  -D DEFAULT_THEME_COLOR=1
;-- no hardware connected
; -D NO_DAC_HARDWARE
;-- Show debug info in Display
; -D DISPLAY_DEBUG_INFO
; -D SD_VERBOSE_DIRECTORY_LISTING

;-- GPIO3       STRAP/JTAG source, vermijden
;-- GPIO22-25   bestaan niet op ESP32-S3
;-- GPIO26-37   flash/PSRAM, vermijden
;-- GPIO45      STRAP, vermijden
;-- GPIO46      STRAP/input-only, vermijden

; --------------------------------------------------
; TFT LCD
; --------------------------------------------------
  -D PIN_TFT_BLK=2
  -D PIN_TFT_RST=4
  -D PIN_TFT_CS=5
  -D PIN_TFT_SCLK=12
  -D PIN_TFT_MOSI=11
  -D PIN_TFT_DC=15

; --------------------------------------------------
; Encoder
; --------------------------------------------------
  -D PIN_ENC_BTN=6
  -D PIN_KEY0=1
  -D PIN_ENC_A=16
  -D PIN_ENC_B=17

; --------------------------------------------------
; I2S Audio
; --------------------------------------------------
  -D PIN_I2S_BCLK=38
  -D PIN_I2S_WS=40    ;-- LRCK
  -D PIN_I2S_DOUT=42  ;-- DATA
  -D PIN_I2S_SD=41    ;-- Not Used

; --------------------------------------------------
; SD Card (eigen SPI bus)
; --------------------------------------------------
  -D PIN_SD_DTCT=10
  -D PIN_SD_CS=13
  -D PIN_SD_SCK=14
  -D PIN_SD_MISO=18
  -D PIN_SD_MOSI=21

; --------------------------------------------------
; I2C
; --------------------------------------------------
  -D PIN_I2C_SDA=8
  -D PIN_I2C_SCL=9

; --------------------------------------------------
; USB-C native
; --------------------------------------------------
  -D PIN_USB_DM=19
  -D PIN_USB_DP=20

; --------------------------------------------------
; Extra GPIO
; --------------------------------------------------
  -D PIN_SPARE1=7
  -D PIN_SPARE3=42
  -D PIN_SPARE4=43
  -D PIN_SPARE5=44
  -D PIN_SPARE6=47
  -D PIN_SPARE7=48

  -D TFT_WIDTH=320
  -D TFT_HEIGHT=240

  -D ENCODER_SHORT_PRESS_MS=50
  -D ENCODER_MEDIUM_PRESS_MS=1000
  -D ENCODER_LONG_PRESS_MS=2000
  -D BUTTON_SHORT_PRESS_MS=50
  -D BUTTON_MEDIUM_PRESS_MS=1000
  -D BUTTON_LONG_PRESS_MS=2000

  -D DEFAULT_AP_SSID=\"Groovebox\"
  -D DEFAULT_AP_PASSWORD=\"\"
  -D DEFAULT_WIFI_HOSTNAME=\"Groovebox\"

  -D DEFAULT_ON_TIME=5
  -D DEFAULT_OFF_TIME=5
  -D DEFAULT_ON_UNIT=1
  -D DEFAULT_OFF_UNIT=1

build_src_flags =
  -Wall
  -Wextra
